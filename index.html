<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AetherEdit — Web Notepad</title>
  
  <!-- Font import (Inter & JetBrains Mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="theme-vscode-dark">
  <div id="app">

    <!-- Main Application Frame -->
    <div id="main-frame">
      
      <!-- Workspace Grid -->
      <main id="workspace">
        
        <!-- Activity Bar (Far Left) -->
        <aside id="activity-bar">
          <div class="activity-top">
            <button class="activity-btn active" id="act-explorer" title="Explorer">
              <i data-lucide="files"></i>
              <div class="active-indicator"></div>
            </button>
          </div>
          <div class="activity-bottom">
            <button class="activity-btn" id="act-settings" title="Settings">
              <i data-lucide="settings"></i>
            </button>
          </div>
        </aside>

        <!-- Sidebar -->
        <aside id="sidebar">
          <div class="sidebar-header">
            <span class="sidebar-title">Explorer</span>
            <div class="sidebar-menu-actions">
              <button id="btn-new-file" title="New File..." class="sidebar-action-icon">
                <i data-lucide="file-plus-2"></i>
              </button>
              <button id="btn-new-folder" title="New Folder..." class="sidebar-action-icon">
                <i data-lucide="folder-plus"></i>
              </button>
              <button id="btn-open-local-file" title="Open Local File..." class="sidebar-action-icon">
                <i data-lucide="file-up"></i>
                <input type="file" id="local-file-input" style="display: none;">
              </button>
              <button id="btn-open-local-folder" title="Open Local Folder..." class="sidebar-action-icon">
                <i data-lucide="folder-open"></i>
                <input type="file" id="local-folder-input" webkitdirectory directory multiple style="display: none;">
              </button>
              <button id="btn-import-project" title="Import Workspace JSON..." class="sidebar-action-icon">
                <i data-lucide="file-input"></i>
                <input type="file" id="file-import-input" accept=".json" style="display: none;">
              </button>
              <button id="btn-export-project" title="Export Workspace JSON" class="sidebar-action-icon">
                <i data-lucide="file-output"></i>
              </button>
              <button id="btn-collapse-tree" title="Collapse Folders" class="sidebar-action-icon">
                <i data-lucide="fold-horizontal"></i>
              </button>
            </div>
          </div>
          
          <div class="sidebar-section">
            <div class="section-header">
              <i data-lucide="chevron-down" class="section-arrow"></i>
              <span class="section-title">WORKSPACE: NOTE</span>
            </div>
            
            <!-- File Tree Container -->
            <div class="file-tree-container">
              <ul id="file-tree" class="tree-root">
                <!-- Dynamically populated via JS -->
              </ul>
            </div>
          </div>
        </aside>
        
        <!-- Sidebar Resizer -->
        <div id="sidebar-resizer" class="resizer horizontal-resizer"></div>
        
        <!-- Editor Layout Group -->
        <section id="editor-layout-group">
          
          <!-- Editor Split Left (Active Editor) -->
          <div id="editor-area">
            
            <!-- Tabs Bar -->
            <div class="tab-bar-container">
              <div id="tab-bar" class="tab-bar">
                <!-- Dynamically populated tabs -->
              </div>
              <div class="tab-actions">
                <button id="btn-save-file" title="Save Active File (Ctrl+S)" class="tab-action-btn">
                  <i data-lucide="save"></i>
                </button>
              </div>
            </div>
            
            <!-- Breadcrumbs bar -->
            <div id="breadcrumbs">
              <span class="breadcrumb-item">workspace</span>
              <span class="breadcrumb-separator">></span>
              <span id="breadcrumb-file" class="breadcrumb-item font-semibold">No File Open</span>
            </div>
            
            <!-- Editor Viewport -->
            <div id="editor-viewport">
              <div id="editor-container">
                <!-- Monaco editor mounted here -->
                <div id="editor-placeholder">
                  <svg class="vscode-watermark" viewBox="0 0 100 100" width="80" height="80">
                    <path d="M78.6 15.6L49 2.5 13.4 19.3c-2.4 1.1-3.6 3.7-2.8 6.3l13.5 44.5L2.9 78.4c-2 1.4-2 4.4 0 5.8l12.7 8.9c1.9 1.3 4.5.9 5.9-1L52.8 55l27.1 27.6c1.4 1.4 3.6 1.7 5.3.7l11.9-7.1c2-1.2 2.5-3.8 1.1-5.6L79.1 48l19.1-22.3c1.4-1.6.9-4.1-1.1-5.1L78.6 15.6z" fill="#3c3c3c" opacity="0.3"/>
                  </svg>
                  <h2>Visual Studio Code Notepad</h2>
                  <div class="shortcuts-guide">
                    <p>Go to File <kbd>Ctrl + P</kbd></p>
                    <p>Save File <kbd>Ctrl + S</kbd></p>
                  </div>
                  <button id="placeholder-new-file" class="primary-btn">New File</button>
                </div>
              </div>
            </div>

          </div>

        </section>
        
      </main>

      <!-- Status Bar -->
      <footer id="status-bar">
        <div class="status-left">
          <span class="status-item" id="status-file-info">No Open File</span>
        </div>
        
        <div class="status-right">
          <span id="status-stats" class="status-item font-mono">Ln 1, Col 1</span>
          <span id="status-autosave-indicator" class="status-item">Spaces: 2</span>
          <button id="btn-settings" class="status-item-btn" title="Manage Settings">
            <i data-lucide="settings"></i>
          </button>
        </div>
      </footer>

    </div>
    
  </div>
  
  <!-- Modals -->
  
  <!-- Creation Prompt Modal -->
  <div id="creation-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content vscode-modal">
      <div class="modal-header">
        <h3 id="creation-modal-title">Create New File</h3>
        <button class="modal-close"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label for="creation-name-input" id="creation-input-label">File Name</label>
          <input type="text" id="creation-name-input" placeholder="index.html" autocomplete="off">
          <span class="input-error" id="creation-error"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-close-btn">Cancel</button>
        <button class="btn-primary" id="creation-submit-btn">Create</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content vscode-modal settings-modal-content">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="modal-close"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="settings-grid">
          <!-- Theme selector -->
          <div class="setting-item">
            <label for="settings-theme">Color Theme</label>
            <select id="settings-theme">
              <option value="theme-vscode-dark">Dark+ (Default Dark)</option>
              <option value="theme-dracula">Dracula (Dark & Neon)</option>
              <option value="theme-onedark">One Dark Pro (Professional)</option>
              <option value="theme-vscode-light">Light+ (Default Light)</option>
            </select>
          </div>
          <!-- Font Size selector -->
          <div class="setting-item">
            <label for="settings-font-size">Editor: Font Size</label>
            <input type="number" id="settings-font-size" min="10" max="36" value="14">
          </div>
          <!-- Tab spacing -->
          <div class="setting-item">
            <label for="settings-tab-size">Editor: Tab Size</label>
            <select id="settings-tab-size">
              <option value="2">2 spaces</option>
              <option value="4">4 spaces</option>
              <option value="8">8 spaces</option>
            </select>
          </div>
          <!-- Auto save toggle -->
          <div class="setting-item checkbox-item">
            <label for="settings-autosave">Files: Auto Save</label>
            <input type="checkbox" id="settings-autosave" checked>
          </div>
          <!-- Minimap toggle -->
          <div class="setting-item checkbox-item">
            <label for="settings-minimap">Editor > Minimap: Enabled</label>
            <input type="checkbox" id="settings-minimap" checked>
          </div>
          <!-- Word Wrap toggle -->
          <div class="setting-item checkbox-item">
            <label for="settings-wordwrap">Editor: Word Wrap</label>
            <input type="checkbox" id="settings-wordwrap" checked>
          </div>
        </div>
        
        <hr class="settings-divider">
        
        <div class="settings-danger-zone">
          <h4>Danger Zone</h4>
          <p>Reset all workspace folders and files back to starter templates.</p>
          <button id="btn-reset-workspace" class="btn-danger">
            <i data-lucide="trash-2"></i> Reset Workspace Files
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary modal-close-btn" style="width: 100%;">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Context Menu (Custom VS Code style) -->
  <div id="context-menu" class="context-menu vscode-context-menu">
    <div class="context-menu-item" id="ctx-rename">
      Rename File...
    </div>
    <div class="context-menu-item danger" id="ctx-delete">
      Delete Permanent
    </div>
  </div>

  <!-- Monaco loader configuration -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
